<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CV">
  <title>Contrapeso Vertical SpA</title>

  <!-- Marco con fondo oscuro -->
  <rect x="1" y="1" width="30" height="30" rx="2" fill="#1c1c1a" stroke="#9a7c3a" stroke-width="1.5"/>

  <!--
    C — centro (11, 16), radio 6.5, apertura ±35°
    Punto superior: (11 + 6.5·cos35°, 16 − 6.5·sin35°) = (16.32, 12.27)
    Punto inferior: (16.32, 19.73)
  -->
  <path d="M 16.32 12.27 A 6.5 6.5 0 1 0 16.32 19.73"
        fill="none" stroke="#f7f4ef" stroke-width="1.8" stroke-linecap="round"/>

  <!-- V — aligned con los extremos verticales de C (y 9.5 a y 22.5) -->
  <path d="M 19 10.5 L 23.5 22.5 L 28 10.5"
        fill="none" stroke="#f7f4ef" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
